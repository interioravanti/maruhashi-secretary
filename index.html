<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丸橋了三 専属AI秘書：Medical & Business</title>
    <style>
        :root { --gold: #ffd700; --dark: #121212; --gray: #2c2c2c; }
        body { font-family: sans-serif; background: var(--dark); color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--gray); color: var(--gold); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; }
        .ai { background: #333; border-left: 4px solid var(--gold); align-self: flex-start; white-space: pre-wrap; }
        .user { background: var(--gold); color: #000; align-self: flex-end; }
        .confirm-card { background: #444; border: 1px solid var(--gold); padding: 15px; border-radius: 10px; margin-top: 10px; }
        .btn-confirm { background: var(--gold); color: #000; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .controls { display: flex; gap: 8px; padding: 10px; background: #1a1a1a; border-top: 1px solid #444; overflow-x: auto; }
        .btn-log { background: #333; border: 1px solid var(--gold); color: var(--gold); padding: 6px 12px; border-radius: 15px; font-size: 0.75rem; white-space: nowrap; }
        #input-area { display: flex; align-items: center; padding: 15px; background: #222; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #333; color: #fff; }
        button#send-btn { background: var(--gold); border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<header>MARUHASHI AI SECRETARY<br><small>データと医学的根拠で支える、了三さんの軍師</small></header>

<div class="controls">
    <button class="btn-log" onclick="addLog('起床')">☀️ 起床</button>
    <button class="btn-log" onclick="addLog('就寝')">🌙 就寝</button>
    <button class="btn-log" onclick="scanDrive()">📁 ドライブのPDFを確認</button>
</div>

<div id="chat-box">
    <div class="msg ai">了三さん、お疲れ様です。秘書です。
メール、LINE、WhatsAppの内容をここに貼り付けてください。
Googleドライブに手配書PDFを保存した場合は、上のボタンを押してください。</div>
</div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="メッセージを貼り付け...">
    <button id="send-btn" onclick="askAI()">送信</button>
</div>

<script>
    // ★ ここに取得したAPIキーを貼り付けてください（' ' は消さないでください）
    const API_KEY = 'AIzaSyDWEYPYjCdUkPTbcdmvtDPQJki63w0pL1I'; 

    async function askAI(customText = null) {
        const input = document.getElementById('user-input');
        const text = customText || input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        if (!customText) input.value = '';

        const prompt = `あなたは丸橋了三さんの専属秘書です。以下の指示を厳守してください：
1. 了三さんを「了三さん」と呼ぶ。
2. 入力内容が予約・予定の場合、必ず【予約確認】として整理し、カレンダー登録の可否を問う。
3. 医学的根拠を添えて助言する。

入力された内容：${text}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            
            // ★改良ポイント：Googleからの本当のエラーメッセージを画面に出す
            if (!response.ok) {
                appendMessage(`【Googleからのエラー報告】\n原因: ${data.error ? data.error.message : '不明'}`, 'ai');
                return;
            }

            const aiText = data.candidates[0].content.parts[0].text;
            appendMessage(aiText, 'ai');
            
            if (aiText.includes("【予約確認】")) {
                appendConfirmCard();
            }
        } catch (e) {
            // ネットワークが繋がっていない時などのエラー
            appendMessage(`【通信エラー】\n詳細: ${e.message}`, 'ai');
        }
    }

    function appendMessage(text, sender) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function appendConfirmCard() {
        const box = document.getElementById('chat-box');
        const card = document.createElement('div');
        card.className = 'confirm-card';
        card.innerHTML = `
            <div style="font-size: 0.8rem; color: #ffd700;">AIがカレンダー用データを作成しました</div>
            <button class="btn-confirm" onclick="registerCalendar()">Googleカレンダーに登録する</button>
        `;
        box.appendChild(card);
        box.scrollTop = box.scrollHeight;
    }

    function registerCalendar() {
        alert("了三さん、カレンダーへの書き込み許可（OAuth設定）が必要です。次にこの設定を行いましょう！");
    }

    function addLog(type) {
        appendMessage(`${type}時間を記録しました。これに基づいた医学的助言を生成します...`, 'user');
        askAI(`今、${type}時間を記録しました。直近の私の体調と仕事量を考慮してアドバイスをください。`);
    }

    function scanDrive() {
        appendMessage("Googleドライブの最新PDFをスキャン中...", 'ai');
    }
</script>
</body>
</html>
