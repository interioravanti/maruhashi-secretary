<script>
  const API_KEY = 'AIzaSyDWEYPYjCdUkPTbcdmvtDPQJki63w0pL1I';

  function appendMessage(text, sender) {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = `msg ${sender}`;
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function appendConfirmCard() {
    const box = document.getElementById('chat-box');
    const card = document.createElement('div');
    card.className = 'confirm-card';
    card.innerHTML = `
      <div style="font-size: 0.8rem; color: #ffd700;">AIがカレンダー用データを作成しました</div>
      <button class="btn-confirm" onclick="registerCalendar()">Googleカレンダーに登録する</button>
    `;
    box.appendChild(card);
    box.scrollTop = box.scrollHeight;
  }

  function registerCalendar() {
    alert("了三さん、カレンダーへの書き込み許可（OAuth設定）が必要です。次にこの設定を行いましょう！");
  }

  async function askAI(customText = null) {
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    const text = (customText ?? input.value).trim();
    if (!text) return;

    appendMessage(text, 'user');
    if (!customText) input.value = '';

    // 送信中UI
    sendBtn.disabled = true;
    sendBtn.innerText = '送信中…';
    const loadingId = `loading-${Date.now()}`;
    appendMessage('（AIが応答中…）', 'ai');
    const box = document.getElementById('chat-box');
    const loadingEl = box.lastElementChild;
    loadingEl.dataset.loadingId = loadingId;

    const prompt = `あなたは丸橋了三さんの専属秘書です。以下の指示を厳守してください：
1. 了三さんを「了三さん」と呼ぶ。
2. 入力内容が予約・予定の場合、必ず【予約確認】として整理し、カレンダー登録の可否を問う。
3. 医学的根拠を添えて助言する。

入力された内容：${text}`;

    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${encodeURIComponent(API_KEY)}`;

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }]
        })
      });

      const data = await response.json();

      // 先に「応答中…」を消す
      if (loadingEl && loadingEl.dataset.loadingId === loadingId) {
        loadingEl.remove();
      }

      // HTTPエラー
      if (!response.ok) {
        const msg = data?.error?.message ?? JSON.stringify(data, null, 2);
        appendMessage(`【Googleからのエラー報告】\nHTTP: ${response.status}\n原因: ${msg}`, 'ai');
        return;
      }

      // candidates が無い/空のとき
      const aiText =
        data?.candidates?.[0]?.content?.parts?.[0]?.text
        ?? data?.candidates?.[0]?.content?.parts?.map(p => p.text).join('')
        ?? null;

      if (!aiText) {
        appendMessage(
          `【AI応答の形式が想定外でした】\n返ってきたデータ:\n${JSON.stringify(data, null, 2)}`,
          'ai'
        );
        return;
      }

      appendMessage(aiText, 'ai');

      if (aiText.includes("【予約確認】")) {
        appendConfirmCard();
      }

    } catch (e) {
      // 応答中…消す
      if (loadingEl && loadingEl.dataset.loadingId === loadingId) {
        loadingEl.remove();
      }
      appendMessage(`【通信エラー】\n詳細: ${e.message}`, 'ai');

    } finally {
      sendBtn.disabled = false;
      sendBtn.innerText = '送信';
    }
  }

  function addLog(type) {
    appendMessage(`${type}時間を記録しました。これに基づいた医学的助言を生成します...`, 'user');
    askAI(`今、${type}時間を記録しました。直近の私の体調と仕事量を考慮してアドバイスをください。`);
  }

  function scanDrive() {
    appendMessage("Googleドライブの最新PDFをスキャン中...", 'ai');
    appendMessage("※GitHub PagesだけではDriveを読むにはOAuthが必要です。次は認証設計を入れましょう。", 'ai');
  }
</script>
