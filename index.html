<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>丸橋了三 専属AI秘書</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c; --gold-light: #f0d080; --gold-dim: #7a6030;
      --dark: #0d0d0d; --surface: #161616; --surface2: #1f1f1f; --surface3: #2a2a2a;
      --border: #333; --text: #e8e8e8; --text-dim: #888; --red: #c0392b; --green: #27ae60;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--dark); color: var(--text); display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
    header { background: var(--surface); border-bottom: 1px solid var(--gold-dim); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .header-title .main { font-family: 'Noto Serif JP', serif; font-size: 1rem; font-weight: 700; color: var(--gold); letter-spacing: 0.08em; }
    .header-title .sub { font-size: 0.65rem; color: var(--text-dim); margin-top: 2px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); }
    .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.error { background: var(--red); }
    #setup-panel { background: var(--surface2); border-bottom: 1px solid var(--gold-dim); padding: 12px 16px; display: none; flex-direction: column; gap: 8px; flex-shrink: 0; }
    #setup-panel.visible { display: flex; }
    #setup-panel label { font-size: 0.75rem; color: var(--gold); }
    .setup-row { display: flex; gap: 8px; }
    #api-key-input { flex: 1; background: var(--surface3); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; font-family: monospace; outline: none; }
    #api-key-input:focus { border-color: var(--gold-dim); }
    .btn-save-key { background: var(--gold); color: #000; border: none; padding: 8px 16px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .setup-hint { font-size: 0.7rem; color: var(--text-dim); }
    .setup-hint a { color: var(--gold-dim); }
    .quick-bar { display: flex; gap: 6px; padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
    .quick-bar::-webkit-scrollbar { display: none; }
    .q-btn { background: var(--surface3); border: 1px solid var(--border); color: var(--text-dim); padding: 5px 12px; border-radius: 20px; font-size: 0.72rem; cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: 'Noto Sans JP', sans-serif; }
    .q-btn:hover { border-color: var(--gold-dim); color: var(--gold-light); }
    #chat-box { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
    .msg-wrap { display: flex; flex-direction: column; max-width: 88%; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg-wrap.user { align-self: flex-end; align-items: flex-end; }
    .msg-wrap.ai { align-self: flex-start; align-items: flex-start; }
    .msg-label { font-size: 0.62rem; color: var(--text-dim); margin-bottom: 4px; }
    .msg { padding: 12px 16px; border-radius: 12px; font-size: 0.88rem; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
    .msg.user { background: var(--gold-dim); color: #f8f0d8; border-bottom-right-radius: 3px; }
    .msg.ai { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .msg.error { background: #2a1212; border: 1px solid #5c2020; color: #e08080; }
    .confirm-card { background: var(--surface); border: 1px solid var(--gold-dim); border-radius: 10px; padding: 16px; margin-top: 8px; max-width: 480px; animation: fadeUp 0.3s ease; }
    .confirm-card h4 { font-family: 'Noto Serif JP', serif; font-size: 0.8rem; color: var(--gold); margin-bottom: 10px; }
    .confirm-btns { display: flex; gap: 8px; margin-top: 14px; }
    .btn-register { flex: 1; background: var(--gold); color: #000; border: none; padding: 9px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
    .btn-edit { flex: 1; background: transparent; color: var(--text-dim); border: 1px solid var(--border); padding: 9px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
    .typing { display: flex; gap: 4px; padding: 14px 16px; align-items: center; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--gold-dim); animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }
    #input-area { display: flex; align-items: flex-end; padding: 12px 14px; background: var(--surface); border-top: 1px solid var(--border); gap: 8px; flex-shrink: 0; }
    #user-input { flex: 1; background: var(--surface3); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 10px; font-size: 0.88rem; font-family: 'Noto Sans JP', sans-serif; outline: none; resize: none; max-height: 120px; min-height: 42px; line-height: 1.5; }
    #user-input:focus { border-color: var(--gold-dim); }
    #user-input::placeholder { color: var(--text-dim); }
    .input-btns { display: flex; flex-direction: column; gap: 6px; }
    #image-input { display: none; }
    .btn-attach { background: var(--surface3); border: 1px solid var(--border); color: var(--text-dim); width: 38px; height: 38px; border-radius: 8px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .btn-attach:hover { border-color: var(--gold-dim); color: var(--gold); }
    #send-btn { background: var(--gold); color: #000; border: none; width: 38px; height: 38px; border-radius: 8px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    #send-btn:hover { background: var(--gold-light); }
    .footer-hint { text-align: center; font-size: 0.65rem; color: var(--text-dim); padding: 4px; background: var(--dark); flex-shrink: 0; }
    .footer-hint button { background: none; border: none; color: var(--gold-dim); font-size: 0.65rem; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
<header>
  <div class="header-title">
    <div class="main">MARUHASHI AI SECRETARY</div>
    <div class="sub">丸橋了三さん 専属 ／ 業務・健康・悩み相談</div>
  </div>
  <div class="status-dot" id="status-dot"></div>
</header>

<div id="setup-panel">
  <label>🔑 GEMINI APIキーを入力してください（初回のみ）</label>
  <div class="setup-row">
    <input type="password" id="api-key-input" placeholder="AIzaSy... から始まるキーを貼り付け">
    <button class="btn-save-key" onclick="saveApiKey()">保存して開始</button>
  </div>
  <p class="setup-hint">
    <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> でAPIキーを取得。
    「制限なし」で作成してください。
  </p>
</div>

<div class="quick-bar">
  <button class="q-btn" onclick="quickAction('起床')">☀️ 起床記録</button>
  <button class="q-btn" onclick="quickAction('就寝')">🌙 就寝記録</button>
  <button class="q-btn" onclick="quickAction('食事')">🍱 食事記録</button>
  <button class="q-btn" onclick="quickAction('健康チェック')">💓 健康チェック</button>
  <button class="q-btn" onclick="quickAction('未完了タスク')">📋 未完了タスク確認</button>
  <button class="q-btn" onclick="quickAction('予約確認')">📅 予約まとめ</button>
</div>

<div id="chat-box">
  <div class="msg-wrap ai">
    <div class="msg-label">AI秘書</div>
    <div class="msg ai">了三さん、お疲れ様です。

メール、LINE、WhatsApp、電話の文字起こしなど、どんな内容でもここに貼り付けてください。

▶ 予約・依頼 → 内容確認後、Googleカレンダーへの登録を提案します
▶ 健康・食事の報告 → 医学的根拠をもとにアドバイスします
▶ 悩み相談・業務改善 → 的確に回答します

写真（食事・手配書など）も📎ボタンから送れます。</div>
  </div>
</div>

<div id="input-area">
  <textarea id="user-input" placeholder="メッセージを入力、または貼り付け..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <div class="input-btns">
    <label for="image-input" class="btn-attach" title="写真を送る">📎</label>
    <input type="file" id="image-input" accept="image/*,application/pdf" onchange="handleFile(event)">
    <button id="send-btn" onclick="sendMessage()">↑</button>
  </div>
</div>
<div class="footer-hint"><button onclick="toggleSetup()">⚙ APIキーを変更</button></div>

<script>
const STORAGE_KEY = 'maruhashi_api_key';
const LOG_KEY = 'maruhashi_health_log';
const TASK_KEY = 'maruhashi_tasks';
let API_KEY = localStorage.getItem(STORAGE_KEY) || '';
let pendingImageData = null, pendingImageType = 'image/jpeg';
let healthLog = JSON.parse(localStorage.getItem(LOG_KEY) || '[]');
let tasks = JSON.parse(localStorage.getItem(TASK_KEY) || '[]');

const SYSTEM_PROMPT = `あなたは丸橋了三さんの専属AI秘書です。
【基本】了三さんと呼ぶ。医学的根拠・データで説得。曖昧な回答禁止。了三さんは束縛嫌いだが論理には納得する。
【予約検出時】必ず「【予約確認】」を含む以下形式で出力：
【予約確認】
・件名：
・日時：
・区間/場所：
・人数・荷物：
・車両指定：
・備考：
「この内容でGoogleカレンダーに登録してよろしいですか？」で締める。
【健康】睡眠不足は認知機能・血圧・事故リスクを数字で示す。食事写真は栄養解析。
【タスク】「後でやる」は期限を確認する。`;

window.addEventListener('DOMContentLoaded', () => {
  if (!API_KEY) { document.getElementById('setup-panel').classList.add('visible'); setStatus('error'); }
  else setStatus('online');
});

function setStatus(s) { document.getElementById('status-dot').className = 'status-dot ' + s; }

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('AIza')) { alert('APIキーは「AIza」で始まります。ご確認ください。'); return; }
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, API_KEY);
  document.getElementById('setup-panel').classList.remove('visible');
  setStatus('online');
  appendMessage('ai', 'APIキーを保存しました。準備完了です。何からお手伝いしますか？');
}

function toggleSetup() {
  const p = document.getElementById('setup-panel');
  p.classList.toggle('visible');
  if (API_KEY) document.getElementById('api-key-input').value = API_KEY;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text && !pendingImageData) return;
  if (!API_KEY) { document.getElementById('setup-panel').classList.add('visible'); return; }
  appendMessage('user', text || '（ファイルを送信しました）');
  input.value = ''; autoResize(input);
  const imgData = pendingImageData, imgType = pendingImageType;
  pendingImageData = null;
  const typing = showTyping();
  try {
    const reply = await callGemini(text, imgData, imgType);
    removeTyping(typing);
    appendMessage('ai', reply);
    if (reply.includes('【予約確認】')) showConfirmCard();
    setStatus('online');
  } catch (err) {
    removeTyping(typing); setStatus('error');
    appendMessage('error', '⚠️ エラー\n\n' + err.message + '\n\n【確認事項】\n・APIキーが正しいか確認\n・Google AI Studioでキーの制限設定を「制限なし」にする\n・「⚙ APIキーを変更」から再入力');
  }
}

async function callGemini(text, imageData, imageType) {
  const models = ['gemini-2.0-flash', 'gemini-1.5-flash-latest', 'gemini-1.5-flash'];
  const parts = [];
  if (imageData) parts.push({ inline_data: { mime_type: imageType, data: imageData } });
  parts.push({ text: SYSTEM_PROMPT + '\n\n了三さんの入力：' + (text || '（ファイルを確認してください）') });
  const body = { contents: [{ role: 'user', parts }], generationConfig: { temperature: 0.7, maxOutputTokens: 1000 } };
  for (const model of models) {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (res.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) return data.candidates[0].content.parts[0].text;
    const c = data.error?.code, m = data.error?.message || `HTTP ${res.status}`;
    if (c === 404) continue;
    if (c === 400) throw new Error(`APIキーが無効（400）\n${m}\n\nGoogle AI Studioで新しいキーを発行してください。`);
    if (c === 403) throw new Error(`アクセス拒否（403）\nAPIキーの「制限設定」を「制限なし」に変更してください。\n${m}`);
    if (c === 429) throw new Error(`リクエスト過多（429）\nしばらく待ってから再試行してください。`);
    throw new Error(`エラー（${c || res.status}）: ${m}`);
  }
  throw new Error('モデルが見つかりません。APIキーが有効か確認してください。');
}

function showConfirmCard() {
  const box = document.getElementById('chat-box');
  const card = document.createElement('div');
  card.className = 'confirm-card';
  card.innerHTML = `<h4>📅 Googleカレンダー登録確認</h4>
    <p style="font-size:0.75rem;color:var(--text-dim);margin-bottom:10px;">上記の内容でよろしければ登録してください</p>
    <div class="confirm-btns">
      <button class="btn-register" onclick="doRegister(this)">✓ カレンダーに登録する</button>
      <button class="btn-edit" onclick="this.closest('.confirm-card').remove()">✕ キャンセル</button>
    </div>`;
  box.appendChild(card); scrollToBottom();
}

function doRegister(btn) {
  btn.disabled = true; btn.textContent = '登録済み ✓'; btn.style.background = '#27ae60';
  appendMessage('ai', '了三さん、登録を確認しました。\n※ Google Calendar APIとの接続が完了すれば自動登録になります。');
}

async function handleFile(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    pendingImageData = e.target.result.split(',')[1];
    pendingImageType = file.type;
    appendMessage('user', `📎 ${file.name}`);
    appendMessage('ai', `「${file.name}」を受け取りました。送信ボタンを押すと解析します。`);
  };
  reader.readAsDataURL(file); event.target.value = '';
}

function quickAction(type) {
  const now = new Date();
  const ts = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  const ds = now.toLocaleDateString('ja-JP');
  let msg = '';
  if (type === '起床') {
    healthLog.push({ type, time: now.toISOString() }); localStorage.setItem(LOG_KEY, JSON.stringify(healthLog));
    msg = `${ds} ${ts} 起床しました。`;
  } else if (type === '就寝') {
    const lw = [...healthLog].reverse().find(l => l.type === '起床');
    const h = lw ? ((now - new Date(lw.time)) / 3600000).toFixed(1) : null;
    healthLog.push({ type, time: now.toISOString() }); localStorage.setItem(LOG_KEY, JSON.stringify(healthLog));
    msg = `${ds} ${ts} 就寝します。${h ? `（活動時間: ${h}時間）` : ''}`;
  } else if (type === '食事') {
    msg = `${ts} 食事をしました。内容を教えてください（または📎で写真を送ってください）。`;
  } else if (type === '健康チェック') {
    const r = healthLog.slice(-10).map(l => `${l.type}: ${new Date(l.time).toLocaleString('ja-JP')}`).join('\n');
    msg = `健康チェックをお願いします。\n\n【最近の記録】\n${r || '記録なし'}`;
  } else if (type === '未完了タスク') {
    const o = tasks.filter(t => !t.done);
    msg = `未完了タスクを確認してください。\n\n${o.length > 0 ? o.map((t, i) => `${i+1}. ${t.text}（${t.date}）`).join('\n') : '未完了タスクはありません'}`;
  } else if (type === '予約確認') {
    msg = '本日の予約と今週の予定をまとめてください。';
  }
  document.getElementById('user-input').value = msg;
  document.getElementById('user-input').focus();
}

function appendMessage(type, text) {
  const box = document.getElementById('chat-box');
  const wrap = document.createElement('div'); wrap.className = `msg-wrap ${type === 'user' ? 'user' : 'ai'}`;
  const label = document.createElement('div'); label.className = 'msg-label';
  label.textContent = type === 'user' ? '了三さん' : type === 'error' ? '⚠ エラー' : 'AI秘書';
  const msg = document.createElement('div'); msg.className = `msg ${type === 'error' ? 'error' : type}`;
  msg.textContent = text;
  wrap.appendChild(label); wrap.appendChild(msg); box.appendChild(wrap); scrollToBottom();
}

function showTyping() {
  const box = document.getElementById('chat-box');
  const wrap = document.createElement('div'); wrap.className = 'msg-wrap ai';
  const t = document.createElement('div'); t.className = 'msg ai typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(t); box.appendChild(wrap); scrollToBottom(); return wrap;
}

function removeTyping(el) { if (el?.parentNode) el.parentNode.removeChild(el); }
function scrollToBottom() { const b = document.getElementById('chat-box'); b.scrollTop = b.scrollHeight; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
</script>
</body>
</html>
