<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>丸橋了三 専属AI秘書</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:#c9a84c;--gold-light:#f0d080;--gold-dim:#7a6030;
      --dark:#080808;--surface:#111;--surface2:#181818;--surface3:#222;
      --border:#2a2a2a;--text:#e0ddd5;--text-dim:#706b60;
      --red:#c0392b;--red-bg:#1a0a08;--green:#2ecc71;--green-bg:#081a0e;
      --orange:#e67e22;--orange-bg:#1a0f00;--blue:#3498db;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--dark);color:var(--text);display:flex;flex-direction:column;height:100dvh;overflow:hidden}
    header{background:var(--surface);border-bottom:1px solid var(--gold-dim);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .h-left{display:flex;align-items:center;gap:12px}
    .h-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 12px rgba(201,168,76,0.3)}
    .h-title{font-family:'Cormorant Garamond',serif;font-size:0.95rem;font-weight:700;color:var(--gold);letter-spacing:0.12em}
    .h-sub{font-size:0.58rem;color:var(--text-dim);margin-top:1px;letter-spacing:0.04em}
    .h-right{display:flex;align-items:center;gap:10px}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);transition:all .3s}
    .status-dot.online{background:var(--green);box-shadow:0 0 8px var(--green)}
    .status-dot.error{background:var(--red);box-shadow:0 0 8px var(--red)}
    .status-label{font-size:0.6rem;color:var(--text-dim)}
    #task-banner{display:none;background:var(--orange-bg);border-bottom:1px solid rgba(230,126,34,0.3);padding:8px 16px;flex-shrink:0;cursor:pointer;transition:all .2s}
    #task-banner.visible{display:flex;align-items:center;gap:10px}
    .banner-text{font-size:0.72rem;color:var(--orange);flex:1}
    .banner-count{background:var(--orange);color:#000;border-radius:10px;padding:2px 9px;font-size:0.65rem;font-weight:700}
    #setup-panel{display:none;background:linear-gradient(180deg,var(--surface2),var(--surface));border-bottom:1px solid var(--gold-dim);padding:16px 18px;flex-direction:column;gap:10px;flex-shrink:0}
    #setup-panel.visible{display:flex}
    .setup-label{font-size:0.78rem;color:var(--gold);font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:0.05em}
    .setup-row{display:flex;gap:8px}
    .setup-input{flex:1;background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:0.82rem;font-family:monospace;outline:none;transition:border .2s}
    .setup-input:focus{border-color:var(--gold)}
    .btn-save{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#000;border:none;padding:10px 20px;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer}
    .quick-bar{display:flex;gap:6px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
    .q-btn{background:var(--surface3);border:1px solid var(--border);color:var(--text-dim);padding:5px 12px;border-radius:20px;font-size:0.68rem;cursor:pointer;white-space:nowrap}
    #chat-box{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:16px}
    .msg-wrap{display:flex;flex-direction:column;max-width:90%;animation:fadeUp .2s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    .msg-wrap.user{align-self:flex-end;align-items:flex-end}
    .msg-wrap.ai{align-self:flex-start;align-items:flex-start}
    .msg-label{font-size:0.6rem;color:var(--text-dim);margin-bottom:3px}
    .msg{padding:12px 16px;border-radius:14px;font-size:0.85rem;line-height:1.6;white-space:pre-wrap;word-break:break-word}
    .msg.user{background:linear-gradient(135deg,var(--gold-dim),#5a4520);color:#fff}
    .msg.ai{background:var(--surface2);border:1px solid var(--border)}
    .msg.error{color:var(--red)}
    #input-area{display:flex;align-items:flex-end;padding:12px 14px;background:var(--surface);border-top:1px solid var(--border);gap:8px}
    #user-input{flex:1;background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:12px;font-size:0.85rem;outline:none;resize:none;max-height:120px}
    #send-btn{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#000;border:none;width:44px;height:44px;border-radius:10px;font-size:1.2rem;cursor:pointer}
    .footer{text-align:center;font-size:0.6rem;color:var(--text-dim);padding:8px;background:var(--dark);display:flex;justify-content:center;gap:15px}
    .footer button{background:none;border:none;color:var(--gold-dim);text-decoration:underline;cursor:pointer}
    .typing{padding:10px;font-style:italic;font-size:0.7rem;color:var(--gold-dim)}
  </style>
</head>
<body>

<header>
  <div class="h-left">
    <div class="h-icon">🚖</div>
    <div>
      <div class="h-title">MARUHASHI AI SECRETARY</div>
      <div class="h-sub">丸橋了三さん 専属秘書</div>
    </div>
  </div>
  <div class="h-right">
    <span class="status-label" id="status-label">待機中</span>
    <div class="status-dot" id="status-dot"></div>
  </div>
</header>

<div id="task-banner" onclick="showTaskList()">
  <span class="banner-text">📌 未完了タスクがあります</span>
  <span class="banner-count" id="task-count-badge">0</span>
</div>

<div id="setup-panel">
  <div class="setup-label">🔑 設定</div>
  <input type="password" class="setup-input" id="api-key-input" placeholder="Gemini または Claude のAPIキー">
  <input type="text" class="setup-input" id="gas-url-input" placeholder="GAS URL (Google連携)">
  <button class="btn-save" onclick="saveSettings()">設定を保存してリロード</button>
</div>

<div class="quick-bar">
  <button class="q-btn" onclick="quickAction('予約確認')">📅 予定確認</button>
  <button class="q-btn" onclick="quickAction('メール確認')">📧 メール確認</button>
  <button class="q-btn" onclick="quickAction('起床')">☀️ 起床</button>
  <button class="q-btn" onclick="quickAction('就寝')">🌙 就寝</button>
  <button class="q-btn" onclick="quickAction('食事')">🍱 食事</button>
</div>

<div id="chat-box"></div>

<div id="input-area">
  <textarea id="user-input" placeholder="メッセージを入力..." rows="1" onkeydown="handleKey(event)"></textarea>
  <button id="send-btn" onclick="sendMessage()">↑</button>
</div>

<div class="footer">
  <button onclick="toggleSetup()">⚙ 設定</button>
  <button onclick="clearChat()">🗑 履歴消去</button>
  <button onclick="fullReset()">🔄 全リセット</button>
</div>

<script>
const S={KEY:'maru_key',TYPE:'maru_type',TASKS:'maru_tasks',HIST:'maru_hist',GAS:'maru_gas'};
let API_KEY=localStorage.getItem(S.KEY)||'';
let API_TYPE=localStorage.getItem(S.TYPE)||'';
let GAS_URL=localStorage.getItem(S.GAS)||'';
let tasks=JSON.parse(localStorage.getItem(S.TASKS)||'[]');
let chatHistory=JSON.parse(localStorage.getItem(S.HIST)||'[]');

window.addEventListener('DOMContentLoaded',()=>{
  if(chatHistory.length===0){
    appendMsg('ai','了三さん、お疲れ様です。本日の予定やメールの確認、何でもお申し付けください。');
  }else{
    chatHistory.slice(-10).forEach(h=>appendMsg(h.role==='assistant'?'ai':'user',h.content,true));
  }
  if(!API_KEY) document.getElementById('setup-panel').classList.add('visible');
  updateTaskBanner();
  setStatus(API_KEY?'online':'error', API_KEY?'接続中':'キー未設定');
});

function buildSystemPrompt(){
  const taskText = tasks.filter(t=>!t.done).map(t=>`・${t.text}`).join('\n') || 'なし';
  return `あなたは丸橋了三さんの専属AI秘書です。
【重要】
- 了三さんを「了三さん」と呼ぶ。
- 丁寧かつ簡潔に。
- 予定が大量にある場合、まず「今日の予定」と「重要事項」を優先し、最後に「他に必要な情報はありますか？」と聞くこと（一度に長文を出しすぎない）。
- 箇条書きを使い、見やすくすること。マークダウン（###等）は不要。
- 今日：${new Date().toLocaleDateString('ja-JP')}
- 未完了タスク：\n${taskText}
- タスク登録が必要な時は末尾に [TASK]内容 [/TASK] と書く。`;
}

async function sendMessage(){
  const input=document.getElementById('user-input');
  const text=input.value.trim();
  if(!text || !API_KEY) return;
  
  appendMsg('user',text);
  input.value='';
  
  let googleData='';
  if(GAS_URL && (text.includes('予定') || text.includes('予約') || text.includes('メール'))){
    setStatus('online','データ取得中...');
    googleData = await fetchGoogleData(text);
  }

  const typing=showTyping();
  try{
    const reply = await callGemini(text, googleData);
    removeTyping(typing);
    
    const cleanReply = reply.replace(/\[TASK\](.*?)\[\/TASK\]/g, (m, p1)=>{
      addTask(p1.trim()); return '';
    }).trim();

    appendMsg('ai', cleanReply);
    chatHistory.push({role:'user',content:text},{role:'assistant',content:cleanReply});
    localStorage.setItem(S.HIST,JSON.stringify(chatHistory.slice(-20)));
    setStatus('online','接続中');
  }catch(e){
    removeTyping(typing);
    appendMsg('error','申し訳ありません。接続が切れました。もう一度短めにお願いします。');
    setStatus('error','エラー');
  }
}

async function callGemini(text, googleData){
  // タイムアウト対策：Flashモデルを使用し、レスポンスを速める
  const model = "gemini-1.5-flash"; 
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;
  
  const prompt = `${buildSystemPrompt()}\n\n【Googleデータ】\n${googleData}\n\n了三さんの指示：${text}`;
  
  const res = await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{role:'user',parts:[{text:prompt}]}],
      generationConfig:{temperature:0.7, maxOutputTokens:2000} // トークンを絞って速く出す
    })
  });
  const data=await res.json();
  return data.candidates[0].content.parts[0].text;
}

async function fetchGoogleData(query){
  try {
    const res = await fetch(GAS_URL + "?q=" + encodeURIComponent(query));
    const data = await res.json();
    return data.result || "データなし";
  } catch(e) { return "（Google連携タイムアウト）"; }
}

function appendMsg(type,text,isHist=false){
  const box=document.getElementById('chat-box');
  const wrap=document.createElement('div');
  wrap.className=`msg-wrap ${type}`;
  const label=document.createElement('div');
  label.className='msg-label';
  label.textContent=(type==='user'?'了三さん':'AI秘書')+' ・ '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  const msg=document.createElement('div');
  msg.className=`msg ${type}`;
  msg.textContent=text;
  wrap.appendChild(label);wrap.appendChild(msg);box.appendChild(wrap);
  if(!isHist) box.scrollTop=box.scrollHeight;
}

function addTask(txt){
  tasks.push({text:txt,done:false});
  localStorage.setItem(S.TASKS,JSON.stringify(tasks));
  updateTaskBanner();
}

function updateTaskBanner(){
  const count=tasks.filter(t=>!t.done).length;
  document.getElementById('task-banner').style.display=count>0?'flex':'none';
  document.getElementById('task-count-badge').textContent=count;
}

function showTaskList(){
  const list=tasks.filter(t=>!t.done).map((t,i)=>`${i+1}. ${t.text}`).join('\n');
  appendMsg('ai',`📋 現在の未完了タスクです：\n${list||'なし'}`);
}

function quickAction(type){
  const input=document.getElementById('user-input');
  if(type==='予約確認') input.value='今週の予定を簡潔にまとめて';
  else if(type==='メール確認') input.value='最新のメールを確認して';
  else input.value=type+'しました。';
  sendMessage();
}

function saveSettings(){
  const k=document.getElementById('api-key-input').value.trim();
  const g=document.getElementById('gas-url-input').value.trim();
  if(k) localStorage.setItem(S.KEY,k);
  if(g) localStorage.setItem(S.GAS,g);
  location.reload();
}

function toggleSetup(){ document.getElementById('setup-panel').classList.toggle('visible'); }
function clearChat(){ localStorage.setItem(S.HIST,'[]'); location.reload(); }
function fullReset(){ localStorage.clear(); location.reload(); }
function setStatus(s,l){ 
  document.getElementById('status-dot').className='status-dot '+s;
  document.getElementById('status-label').textContent=l;
}
function showTyping(){
  const d=document.createElement('div'); d.className='typing'; d.textContent='秘書が入力中...';
  document.getElementById('chat-box').appendChild(d); return d;
}
function removeTyping(el){ if(el) el.remove(); }
function handleKey(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } }
</script>
</body>
</html>
